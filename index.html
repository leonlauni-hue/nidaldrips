<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>all links here</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* Animated starfield background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(100, 160, 255, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(80, 120, 220, 0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 60% 85%, rgba(60, 100, 200, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      padding: 40px 20px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Snowflake particles */
    .snowflakes {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .snowflake {
      position: absolute;
      top: -20px;
      color: rgba(160, 200, 255, 0.25);
      font-size: 1rem;
      animation: fall linear infinite;
      user-select: none;
    }
    @keyframes fall {
      to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    /* Profile section */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 36px;
    }

    .avatar-ring {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, #4a90d9, #a8c8f0, #2a5fa0);
      box-shadow: 0 0 30px rgba(74, 144, 217, 0.4), 0 0 60px rgba(74, 144, 217, 0.15);
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #0a0a0f;
    }

    .name {
      font-size: 1.45rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.01em;
      text-align: center;
      text-shadow: 0 0 20px rgba(74, 144, 217, 0.5);
    }

    .name .ice {
      color: #7ab8e8;
    }

    .flags {
      font-size: 1.1rem;
      letter-spacing: 4px;
      margin-top: -6px;
      opacity: 0.85;
    }

    /* Buttons */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.08);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      position: relative;
    }

    .link-btn:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }

    /* Shipping button */
    .btn-shipping {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }
    .btn-shipping:hover {
      border-color: rgba(120, 180, 255, 0.3);
      box-shadow: 0 12px 40px rgba(74, 144, 217, 0.2);
    }

    /* Telegram button */
    .btn-telegram {
      background: linear-gradient(135deg, #141428 0%, #1a1a35 50%, #0d2045 100%);
    }
    .btn-telegram:hover {
      border-color: rgba(100, 160, 240, 0.3);
      box-shadow: 0 12px 40px rgba(40, 100, 200, 0.2);
    }

    .btn-left {
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex: 1;
      min-height: 80px;
    }

    .btn-title {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
    }

    .btn-sub {
      font-size: 0.78rem;
      color: rgba(160, 200, 255, 0.75);
      margin-top: 3px;
      font-weight: 500;
    }

    .btn-icon {
      width: 88px;
      min-width: 88px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.04);
      border-left: 1px solid rgba(255,255,255,0.06);
    }

    .btn-icon img {
      width: 52px;
      height: 52px;
      object-fit: contain;
      border-radius: 12px;
    }

    /* Telegram icon */
    .tg-circle {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #2AABEE, #229ED9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(42, 171, 238, 0.35);
    }

    .tg-circle svg {
      width: 28px;
      height: 28px;
      fill: white;
    }

    /* Hippo icon placeholder */
    .hippo-circle {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #1e3a6e, #2a5fa0);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      box-shadow: 0 4px 15px rgba(42, 100, 200, 0.3);
    }

    /* Footer */
    .footer {
      margin-top: 44px;
      color: rgba(255,255,255,0.18);
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      text-align: center;
    }
  </style>
</head>
